[options]
env_name = NH_center
dynamic_name = SimpleMultirotor

navigation_3d = True
using_velocity_state = False
reward_type = reward_final

perception = vector

algo = SAC
total_timesteps = 200000

policy_name = mlp
net_arch = [256, 128, 64]
activation_function = tanh
cnn_feature_num = 5

keyboard_debug = False
generate_q_map = False
q_map_save_steps = 1000

use_wandb = False

[wandb]
name = NH-3D-SAC-MLP-v1
notes = SAC + MLP 3D navigation training

[environment]
max_depth_meters = 15
screen_height = 60
screen_width = 90

crash_distance = 1
accept_radius = 2

[multirotor]
dt = 0.1
acc_xy_max = 2.0
v_xy_max = 5
v_xy_min = 0.5
v_z_max = 1.0
yaw_rate_max_deg = 30.0


[DRL]
gamma = 0.99
learning_rate = 3e-4
learning_starts = 2000
buffer_size = 100000
batch_size = 256
train_freq = 100
gradient_steps = 100
action_noise_sigma = 0.1
