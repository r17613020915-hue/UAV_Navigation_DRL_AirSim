[options]
# Episode内自适应调节配置
# 在每个Episode内部动态调整攻击阈值

# 基本设置
eval_ep_num = 20
eval_env = SimpleAvoid
eval_dynamics = Multirotor

# 攻击设置
enable_attack = true
attack_trigger_mode = statistical
attack_type = fgsm
attack_epsilon = 0.07

# Episode内调节的初始阈值
statistical_entropy_scale = 8.0    # 初始熵阈值 (会自动调节)
statistical_q_diff_scale = 1.0     # Q值差异阈值
statistical_variance_scale = 2.0   # 初始方差阈值 (会自动调节)

# 其他攻击参数
attack_confidence_threshold = 0.7
random_attack_probability = 0.1
step_attack_m = 3
step_interval_n = 7

# 调试设置
debug_attack = true
