; Smart QE 攻击配置文件示例
; 在Smart攻击基础上增加Q值差异和动作熵
; 触发条件: 高风险 + (高置信度 OR (高Q差异 AND 低熵))

[options]
env_name = SimpleAvoid
dynamic_name = Multirotor

navigation_3d = False
using_velocity_state = False
reward_type = reward_final


save_best_model = false
best_model_check_freq = 4000
best_model_metric = success_rate
best_model_min_improvement = 0.01   


save_checkpoints = true
checkpoint_freq = 10000


perception = depth

algo = SAC
total_timesteps = 250000

policy_name = CNN_GAP

net_arch = [128, 64]
activation_function = relu
cnn_feature_num = 48

keyboard_debug = False
generate_q_map = True
q_map_save_steps = 10000

use_wandb = false


[wandb]
name = Maze-2D-SmartQE-SAC
notes = test smart qe attack

[environment]
max_depth_meters = 15
screen_height = 60
screen_width = 90

crash_distance = 2
accept_radius = 2

[multirotor]
dt = 0.1
acc_xy_max = 2.0
v_xy_max = 5
v_xy_min = 2
v_z_max = 2.0 
yaw_rate_max_deg = 30.0


[DRL]
gamma = 0.99
learning_rate = 3e-4
learning_starts = 2000
buffer_size = 50000
batch_size = 256
train_freq = 100
gradient_steps = 100
action_noise_sigma = 0.1

; SAC特定参数
ent_coef = 0.05

; ==================== 攻击配置 ====================
; 是否启用攻击
enable_attack = true

; 攻击类型: fgsm, pgd, random, targeted, none, deepfool, cw, bim, mim, crash, combo, strong_combo, smart_q_entropy, smart_qe
attack_type = smart_qe

; 攻击强度 epsilon
attack_epsilon = 0.08

; 攻击触发模式: always, confidence, risk, smart, smart_q, smartc, smartc_continuous, step_interval, random, statistical, critical_state, smart_q_entropy, smart_qe
attack_trigger_mode = smart_qe

; 动作置信度阈值 (0-1)，超过此阈值才触发攻击
attack_confidence_threshold = 0.5

; ==================== Smart QE 特定参数 ====================
; Smart QE攻击触发参数 (在Smart基础上增加Q值差异和动作熵)
smart_qe_entropy_threshold = 0.4   ; 熵阈值：低于此值表示动作集中
smart_qe_q_diff_threshold = 0.3    ; Q值差异阈值：高于此值表示critic不确定
smart_qe_strict_risk_multiplier = 1.5  ; 严格风险阈值倍数
smart_qe_strict_conf_multiplier = 1.3  ; 严格置信度阈值倍数

; ==================== Smart Q-Entropy 融合攻击参数 (供参考) ====================
smart_q_entropy_threshold = 0.5  ; 融合分数阈值
smart_q_entropy_risk_weight = 0.3  ; 风险权重
smart_q_entropy_entropy_weight = 0.35  ; 熵权重
smart_q_entropy_q_weight = 0.35  ; Q值权重

; 风险相关参数 (用于smart, risk, smartc等模式)
risk_threshold = 0.6  ; 风险阈值
risk_margin = 3.0  ; 风险边距

; 统计方法阈值缩放参数 (用于statistical, critical_state, smart_q等模式)
statistical_entropy_scale = 3.0
statistical_q_diff_scale = 0.5
statistical_variance_scale = 0.5

; 步数间隔攻击参数 (用于step_interval模式)
step_interval_n = 5
step_attack_m = 2

; 随机攻击概率 (用于random模式)
random_attack_probability = 0.3

; 连续攻击步数 (用于smartc_continuous模式)
continuous_attack_steps = 3

